<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facilitator Dashboard</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <main class="screen">
    <section class="hero-panel">
      <p class="status-tag">Facilitator View</p>
      <h1>Session Control</h1>
      <div class="mission-card">
        <div id="connection-state">Connecting…</div>
        <button id="refresh-btn">Refresh</button>
        <button id="escalate-btn">Escalate</button>
        <button id="reset-btn">Reset Session</button>
      </div>
      <div class="mission-card">
        <h2>Live Session</h2>
        <pre id="session-view"></pre>
      </div>
      <div class="mission-card">
        <h2>Recent Events</h2>
        <pre id="events-view"></pre>
      </div>
    </section>
  </main>
  <script type="module" src="../scripts/facilitator.js"></script>
</body>
</html>
