<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Facilitator Dashboard</title>

  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/evidenceBoard.css" />
  <link rel="stylesheet" href="../styles/immersiveEnvironment.css" />
</head>

<body>
  <div class="immersive-environment environment-pulse"></div>

  <main class="session-shell">

    <section class="session-header">
      <div>
        <p class="eyebrow">Facilitator Dashboard</p>
        <h1>MedDetectives Control Center</h1>
        <p>Educational oversight and live intervention management.</p>
      </div>
    </section>

    <section class="portal-card">
      <p class="eyebrow">Live Sessions</p>
      <h2>Active Investigation Teams</h2>

      <div
        id="active-sessions-board"
        class="evidence-board-grid"
      ></div>
    </section>

    <section class="portal-card">
      <p class="eyebrow">Educational Interventions</p>
      <h2>Escalation Controls</h2>

      <div
        id="intervention-board"
        class="evidence-board-grid"
      ></div>
    </section>

    <section class="portal-card">
      <p class="eyebrow">Competency Tracking</p>
      <h2>Learning Outcomes Monitoring</h2>

      <div
        id="competency-board"
        class="evidence-board-grid"
      ></div>
    </section>

    <section class="portal-card">
      <p class="eyebrow">Reflection Feed</p>
      <h2>Participant Debrief Data</h2>

      <div
        id="reflection-board"
        class="evidence-board-grid"
      ></div>
    </section>

  </main>

  <script
    type="module"
    src="../scripts/facilitatorDashboard.js"
  ></script>
</body>
</html>
