<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facilitator Snapshot | MedDetectives</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <main class="facilitator-snapshot-layout">
    <section class="snapshot-header">
      <p class="eyebrow">Facilitator Awareness</p>
      <h1>Learning Journey Snapshot</h1>
      <p>
        Observe collaborative reasoning progression and guide participant learning conversations.
      </p>
    </section>

    <section class="snapshot-grid">
      <article class="snapshot-card">
        <h2>Current Stage</h2>
        <p id="current-stage"></p>
      </article>

      <article class="snapshot-card">
        <h2>Discoveries</h2>
        <p id="discovery-count"></p>
      </article>

      <article class="snapshot-card">
        <h2>Emerging Interpretations</h2>
        <p id="hypothesis-count"></p>
      </article>

      <article class="snapshot-card">
        <h2>Suggested Guidance</h2>
        <p id="facilitator-guidance"></p>
      </article>
    </section>
  </main>

  <script type="module" src="../scripts/facilitator-snapshot.js"></script>
</body>
</html>
