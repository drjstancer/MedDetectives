<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collaborative Synthesis | MedDetectives</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <main class="synthesis-layout">
    <section class="synthesis-hero">
      <p class="eyebrow">Collaborative Reasoning Stage</p>
      <h1>Evidence & Interpretation Synthesis</h1>
      <p>
        Compare interpretations, connect evidence, identify uncertainty,
        and collaboratively refine emerging hypotheses.
      </p>
    </section>

    <section class="synthesis-board">
      <div class="evidence-column">
        <h2>Evidence Connections</h2>
        <div id="evidence-connections"></div>
      </div>

      <div class="hypothesis-column">
        <h2>Emerging Interpretations</h2>
        <div id="hypothesis-list"></div>
      </div>

      <div class="reflection-column">
        <h2>Unresolved Questions</h2>
        <div id="reflection-questions"></div>
      </div>
    </section>
  </main>

  <script type="module" src="../scripts/synthesis.js"></script>
</body>
</html>
